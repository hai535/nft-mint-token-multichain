[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
ethereum = "${ETH_RPC}"
bsc      = "https://bsc-dataseed.binance.org"
base     = "https://mainnet.base.org"
sepolia  = "${SEPOLIA_RPC}"
bsc_test = "https://data-seed-prebsc-1-s1.binance.org:8545"
base_sep = "https://sepolia.base.org"

[etherscan]
ethereum = { key = "${ETHERSCAN_KEY}" }
bsc      = { key = "${BSCSCAN_KEY}",  url = "https://api.bscscan.com/api" }
base     = { key = "${BASESCAN_KEY}", url = "https://api.basescan.org/api" }
